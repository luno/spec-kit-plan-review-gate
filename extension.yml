schema_version: "1.0"

extension:
  id: "plan-review"
  name: "Plan Review Gate"
  version: 2.0.0
  description: "Spec Kit extension for requiring a plan to be reviewed before proceeding with /speckit.tasks"
  author: "luno"
  repository: "https://github.com/luno/spec-kit-plan-review"
  license: "MIT"
  homepage: "https://github.com/luno/spec-kit-plan-review"

requires:
  speckit_version: ">=0.1.0"

provides:
  commands:
    - name: "speckit.plan-review.check"
      file: "commands/check.md"
      description: "Check that spec.md and plan.md have been merged via MR/PR before allowing task generation"

hooks:
  before_tasks:
    command: "speckit.plan-review.check"
    optional: false
    description: "Require spec.md and plan.md to be merged via MR before proceeding to task generation"

tags:
  - "review"
  - "quality"
  - "workflow"
  - "gate"
